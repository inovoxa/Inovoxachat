# ============================================================
# Inovoxachat (Chatwoot fork v4.15.1) — deploy no Coolify via "Docker Compose Empty"
# Cole este YAML no campo de compose do recurso e preencha as Environment Variables
# (ver .env.example desta pasta). Usa a imagem PRÓPRIA da Inovoxa, buildada do source
# pelo GitHub Actions (.github/workflows/inovoxa-build.yml) e publicada no GHCR.
# Requer que o primeiro build do Actions já tenha concluído e que o Coolify tenha
# credencial de pull do GHCR (pacote privado) — ver README desta pasta.
#
# O Coolify roteia o domínio público pela variável mágica SERVICE_FQDN_RAILS_3000
# (serviço `rails`, porta 3000). Defina o domínio na aba do serviço e use o MESMO
# valor em FRONTEND_URL. Postgres/Redis são internos (não expostos ao host).
# ============================================================

# Bloco de variáveis comum a rails e sidekiq (mapa -> permite merge com <<).
x-app-env: &app-env
  INSTALLATION_ENV: docker
  NODE_ENV: production
  RAILS_ENV: production
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  FRONTEND_URL: ${FRONTEND_URL}
  FORCE_SSL: ${FORCE_SSL:-true}
  DEFAULT_LOCALE: ${DEFAULT_LOCALE:-pt_BR}
  ENABLE_ACCOUNT_SIGNUP: ${ENABLE_ACCOUNT_SIGNUP:-false}
  ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}
  ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}
  ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}
  POSTGRES_HOST: postgres
  POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DATABASE: ${POSTGRES_DATABASE:-chatwoot}
  RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
  MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
  SMTP_DOMAIN: ${SMTP_DOMAIN}
  SMTP_ADDRESS: ${SMTP_ADDRESS}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-login}
  SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO:-true}
  RAILS_LOG_TO_STDOUT: "true"
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-base: &base
  # :latest = última imagem publicada pelo Actions (pega features novas como OCS/Captain).
  # Fixe numa tag (ex.: :4.15.1 ou a sha) se preferir builds imutáveis.
  image: ghcr.io/inovoxa/inovoxachat:latest
  pull_policy: always
  restart: always
  volumes:
    - storage_data:/app/storage

services:
  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
    environment:
      <<: *app-env
      # Coolify gera o domínio HTTPS e roteia para a porta 3000 deste serviço.
      SERVICE_FQDN_RAILS_3000: ""
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
    environment:
      <<: *app-env
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-chatwoot}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    image: redis:alpine
    restart: always
    # $$ escapa a interpolação do compose; o shell do container expande REDIS_PASSWORD.
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  storage_data:
  postgres_data:
  redis_data:
