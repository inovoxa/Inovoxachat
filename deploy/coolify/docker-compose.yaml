# ============================================================
# Inovoxachat (Chatwoot v4.14.2) — deploy de PRODUÇÃO no Coolify
# Derivado do docker-compose.production.yaml oficial do Chatwoot.
# Única diferença em relação ao oficial: a imagem está FIXADA em v4.14.2
# (pinning de versão — não altera o produto) e as portas dos serviços
# internos (postgres/redis) NÃO são publicadas no host (o proxy do Coolify
# roteia o domínio direto para o serviço `rails` na porta 3000).
#
# Variáveis: defina na UI do Coolify (Environment Variables). Veja
# `.env.example` nesta pasta. Segredos NUNCA entram no repositório.
# ============================================================
services:
  base: &base
    image: chatwoot/chatwoot:v4.14.2
    pull_policy: always
    restart: always
    volumes:
      - storage_data:/app/storage
    environment:
      - INSTALLATION_ENV=docker
      - NODE_ENV=production
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - FRONTEND_URL=${FRONTEND_URL}
      - FORCE_SSL=${FORCE_SSL:-true}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-pt_BR}
      - ENABLE_ACCOUNT_SIGNUP=${ENABLE_ACCOUNT_SIGNUP:-false}
      # Active Record Encryption (necessário para 2FA / campos cifrados)
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY}
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY}
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT}
      # PostgreSQL (serviço `postgres` deste compose — dedicado ao Chatwoot)
      - POSTGRES_HOST=postgres
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-chatwoot}
      - RAILS_MAX_THREADS=${RAILS_MAX_THREADS:-5}
      # Redis (serviço `redis` deste compose)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Armazenamento de anexos (volume local persistente)
      - ACTIVE_STORAGE_SERVICE=${ACTIVE_STORAGE_SERVICE:-local}
      # E-mail (confirmação de conta, convites, notificações)
      - MAILER_SENDER_EMAIL=${MAILER_SENDER_EMAIL}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      - SMTP_ADDRESS=${SMTP_ADDRESS}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_AUTHENTICATION=${SMTP_AUTHENTICATION:-login}
      - SMTP_ENABLE_STARTTLS_AUTO=${SMTP_ENABLE_STARTTLS_AUTO:-true}
      # Logs
      - RAILS_LOG_TO_STDOUT=true
      - LOG_LEVEL=${LOG_LEVEL:-info}

  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
    # O Coolify roteia o domínio HTTPS para esta porta (não publicar no host).
    expose:
      - "3000"
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE:-chatwoot}
      - POSTGRES_USER=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

volumes:
  storage_data:
  postgres_data:
  redis_data:
