# Build da imagem própria da Inovoxa (Chatwoot fork) e publicação no GitHub Container Registry.
# Builda docker/Dockerfile a partir do código deste fork e publica em
# ghcr.io/inovoxa/inovoxachat. O Coolify puxa a imagem pronta (build fora da VPS).
name: Build Inovoxachat image

on:
  push:
    branches: [main]
    # Ignora mudanças que não afetam a imagem (evita builds desnecessários ~30 min).
    paths-ignore:
      - 'deploy/**'
      - '**/*.md'
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions

concurrency:
  group: inovoxa-build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/inovoxa/inovoxachat
  CHATWOOT_VERSION: "4.15.1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.CHATWOOT_VERSION }}
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
