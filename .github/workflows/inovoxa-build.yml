# Build da imagem própria da Inovoxa (Chatwoot fork) e publicação no GitHub Container Registry.
# Builda docker/Dockerfile a partir do código deste fork e publica em
# ghcr.io/inovoxa/inovoxachat. O Coolify puxa a imagem pronta (build fora da VPS).
name: Build Inovoxachat image

on:
  push:
    branches: [main]
    # Ignora mudanças que não afetam a imagem (evita builds desnecessários ~30 min).
    paths-ignore:
      - 'deploy/**'
      - '**/*.md'
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions

concurrency:
  group: inovoxa-build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/inovoxa/inovoxachat
  CHATWOOT_VERSION: "4.15.1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.CHATWOOT_VERSION }}
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # CD: dispara o redeploy no Portainer (Swarm puxa a imagem :latest recém-publicada).
      # Configure os secrets PORTAINER_WEBHOOK_RAILS e PORTAINER_WEBHOOK_SIDEKIQ no GitHub
      # (Settings > Secrets and variables > Actions). Cada um é a URL do webhook do serviço
      # no Portainer. Sem os secrets, o step é ignorado (não falha).
      - name: Redeploy no Portainer (webhook)
        env:
          HOOK_RAILS: ${{ secrets.PORTAINER_WEBHOOK_RAILS }}
          HOOK_SIDEKIQ: ${{ secrets.PORTAINER_WEBHOOK_SIDEKIQ }}
        run: |
          if [ -n "$HOOK_RAILS" ]; then
            echo "Disparando redeploy do rails..."; curl -fsSL -X POST "$HOOK_RAILS" && echo " ok"
          else echo "PORTAINER_WEBHOOK_RAILS não definido — pulando."; fi
          if [ -n "$HOOK_SIDEKIQ" ]; then
            echo "Disparando redeploy do sidekiq..."; curl -fsSL -X POST "$HOOK_SIDEKIQ" && echo " ok"
          else echo "PORTAINER_WEBHOOK_SIDEKIQ não definido — pulando."; fi

      # CD alternativo: redeploy no Coolify. O recurso (compose) é único, então um webhook
      # redeploya rails+sidekiq+pg+redis. Use o endpoint de deploy da API do Coolify:
      #   COOLIFY_WEBHOOK = https://<coolify>/api/v1/deploy?uuid=<uuid-do-recurso>
      #   COOLIFY_TOKEN   = API token do Coolify (Bearer). Opcional se a URL já autentica.
      # Sem o secret COOLIFY_WEBHOOK, o step é ignorado (não falha).
      - name: Redeploy no Coolify (webhook)
        env:
          HOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$HOOK" ]; then echo "COOLIFY_WEBHOOK não definido — pulando."; exit 0; fi
          echo "Disparando redeploy no Coolify..."
          if [ -n "$TOKEN" ]; then
            curl -fsSL -X POST -H "Authorization: Bearer $TOKEN" "$HOOK" && echo " ok"
          else
            curl -fsSL -X POST "$HOOK" && echo " ok"
          fi
